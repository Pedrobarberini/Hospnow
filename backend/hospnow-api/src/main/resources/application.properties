spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

server.address=0.0.0.0
server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.default_batch_fetch_size=50

app.cors.allowed-origins=${APP_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,https://pedrobarberini.github.io}
app.admin.import-key=${ADMIN_IMPORT_KEY:}
app.official-data.cnes-base-url=${OFFICIAL_DATA_CNES_BASE_URL:https://apidadosabertos.saude.gov.br}
app.official-data.ans-products-url=${OFFICIAL_DATA_ANS_PRODUCTS_URL:https://dadosabertos.ans.gov.br/FTP/PDA/produtos_e_prestadores_hospitalares/produtos_e_prestadores_hospitalares.zip}
